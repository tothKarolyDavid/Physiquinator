<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Physiquinator</title>
    <base href="/" />
    <script>
        (function () {
            var key = "physiquinator-theme-preference";
            var preference = localStorage.getItem(key) || "system";
            var isDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            var theme = preference === "system" ? (isDark ? "dark" : "light") : preference;
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/bootstrap-icons/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="Physiquinator.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="js/theme.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
