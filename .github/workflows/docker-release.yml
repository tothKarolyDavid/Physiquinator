name: Docker Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-android-docker:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Android with Docker
      run: |
        docker build -f Dockerfile.android -t physiquinator-android .
        docker create --name temp-container physiquinator-android
        mkdir -p ./artifacts/android
        docker cp temp-container:/app/artifacts/android/. ./artifacts/android/
        docker rm temp-container
        ls -la ./artifacts/android/
    
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: ./artifacts/android/*-Signed.apk

  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.100'
        global-json-file: global.json

    - name: Verify .NET installation
      run: |
        dotnet --version
        dotnet --list-sdks

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore Physiquinator.csproj

    - name: Build Windows Package
      run: |
        dotnet publish Physiquinator.csproj `
          -f net9.0-windows10.0.19041.0 `
          -c Release `
          -p:WindowsPackageType=None `
          -p:WindowsAppSDKSelfContained=true `
          -p:PublishSingleFile=false `
          -p:SelfContained=true `
          -p:RuntimeIdentifier=win-x64 `
          -o ./artifacts/windows

    - name: Upload Windows build
      uses: actions/upload-artifact@v4
      with:
        name: windows-package
        path: ./artifacts/windows/**/*

  create-release:
    needs: [build-android-docker, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Android APK
      uses: actions/download-artifact@v4
      with:
        name: android-apk
        path: ./release/android

    - name: Download Windows package
      uses: actions/download-artifact@v4
      with:
        name: windows-package
        path: ./release/windows

    - name: Prepare release assets
      run: |
        cd release
        # Rename Android APK to user-friendly name
        if [ -f android/*-Signed.apk ]; then
          mv android/*-Signed.apk android/Physiquinator-Android.apk
        fi
        
        # Zip Windows build
        cd windows
        zip -r ../Physiquinator-Windows.zip .
        cd ..

    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Physiquinator v${{ steps.get_version.outputs.version }}
        body: |
          ## 📦 Downloads
          
          ### Android
          - **Physiquinator-Android.apk** - Install on Android devices (Android 7.0+)
          
          ### Windows
          - **Physiquinator-Windows.zip** - Extract and run on Windows 10/11
          
          ## 📝 Installation Instructions
          
          ### Android
          1. Download `Physiquinator-Android.apk`
          2. Enable "Install from Unknown Sources" in Settings → Security
          3. Open the APK file to install
          
          ### Windows
          1. Download `Physiquinator-Windows.zip`
          2. Extract all files to a folder
          3. Run `Physiquinator.exe`
          
          ---
          
          Built with ❤️ using .NET 9 MAUI (Docker-based build)
        files: |
          release/android/Physiquinator-Android.apk
          release/Physiquinator-Windows.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
