name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Verify .NET installation
      run: |
        dotnet --version
        dotnet --list-sdks
        dotnet --info

    - name: Configure NuGet sources
      run: |
        dotnet nuget list source
        dotnet nuget add source https://api.nuget.org/v3/index.json `
          --name nuget.org 2>$null || echo "Source may already exist"
        dotnet nuget list source

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore Physiquinator.csproj

    - name: Build Android APK
      run: |
        dotnet publish Physiquinator.csproj `
          -f net9.0-android `
          -c Release `
          -p:AndroidPackageFormat=apk `
          -p:AndroidKeyStore=false `
          -p:NoWarn=XA0141 `
          -o ./artifacts/android

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: ./artifacts/android/*-Signed.apk

  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Verify .NET installation
      run: |
        dotnet --version
        dotnet --list-sdks
        dotnet --info

    - name: Configure NuGet sources
      run: |
        dotnet nuget list source
        dotnet nuget add source https://api.nuget.org/v3/index.json `
          --name nuget.org 2>$null || echo "Source may already exist"
        dotnet nuget list source

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore Physiquinator.csproj

    - name: Build Windows Package
      run: |
        dotnet publish Physiquinator.csproj `
          -f net9.0-windows10.0.19041.0 `
          -c Release `
          -p:WindowsPackageType=None `
          -p:WindowsAppSDKSelfContained=true `
          -p:PublishSingleFile=false `
          -p:SelfContained=true `
          -p:RuntimeIdentifier=win-x64 `
          -o ./artifacts/windows

    - name: Upload Windows build
      uses: actions/upload-artifact@v4
      with:
        name: windows-package
        path: ./artifacts/windows/**/*

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Android APK
      uses: actions/download-artifact@v4
      with:
        name: android-apk
        path: ./release/android

    - name: Download Windows package
      uses: actions/download-artifact@v4
      with:
        name: windows-package
        path: ./release/windows

    - name: Prepare release assets
      run: |
        cd release
        # Rename Android APK to user-friendly name
        if [ -f android/*-Signed.apk ]; then
          mv android/*-Signed.apk android/Physiquinator-Android.apk
        fi
        
        # Zip Windows build
        cd windows
        zip -r ../Physiquinator-Windows.zip .
        cd ..

    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Physiquinator v${{ steps.get_version.outputs.version }}
        body: |
          ## 📦 Downloads
          
          ### Android
          - **Physiquinator-Android.apk** - Install on Android devices
            - You may need to enable "Install from Unknown Sources" in your device settings
          
          ### Windows
          - **Physiquinator-Windows.zip** - Extract and run on Windows 10/11
            - Extract the ZIP file
            - Run `Physiquinator.exe`
          
          ## 📝 Installation Instructions
          
          ### Android Installation
          1. Download `Physiquinator-Android.apk`
          2. Enable "Install from Unknown Sources" in Settings → Security
          3. Open the APK file to install
          
          ### Windows Installation
          1. Download `Physiquinator-Windows.zip`
          2. Extract all files to a folder
          3. Run `Physiquinator.exe`
          
          ---
          
          Built with ❤️ using .NET MAUI
        files: |
          release/android/Physiquinator-Android.apk
          release/Physiquinator-Windows.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
