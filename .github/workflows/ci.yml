name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Physiquinator.Tests/Physiquinator.Tests.csproj

    - name: Build
      run: dotnet build Physiquinator.Tests/Physiquinator.Tests.csproj --no-restore --configuration Release

    - name: Test
      run: dotnet test Physiquinator.Tests/Physiquinator.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: xUnit Tests
        path: '**/test-results.trx'
        reporter: dotnet-trx
